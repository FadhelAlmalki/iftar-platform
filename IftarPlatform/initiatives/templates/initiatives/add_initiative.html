{% extends 'main/base.html' %}
{% load static %}

{% block title %}Add Initiative - Iftar Platform{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
	<div class="col-12 col-md-8 col-lg-7">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">
				<h1 class="h4 mb-4">Create a New Initiative</h1>

				<form method="post" action="{% url 'initiatives:add_initiative_view' %}" enctype="multipart/form-data">
					{% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label">Initiative Name</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Initiative Description</label>
                        <textarea class="form-control" id="description" name="description" rows="6" required></textarea>
                    </div>

                    <div class="mb-3">
						<label for="city" class="form-label">City</label>
						<select class="form-control" id="city" name="cities" required>
							<option value="" selected disabled>Select a city</option>
							{% for city in cities %}
								<option value="{{ city.id }}">{{ city.name }}</option>
							{% endfor %}
						</select>
					</div>

                    <div class="mb-3">
                        <label for="place" class="form-label">Place Name</label>
                        <input type="text" class="form-control" id="place" name="place" required>
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label">Place Image</label>
                        <input type="file" class="form-control" id="image" name="image" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="starts_at" class="form-label">Starts At</label>
                        <input type="datetime-local" class="form-control" id="starts_at" name="starts_at" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="ends_at" class="form-label">Ends At</label>
                        <input type="datetime-local" class="form-control" id="ends_at" name="ends_at" required>
                    </div>

					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-success">Add Initiative</button>
						<a href="{% url 'main:home_view' %}" class="btn btn-outline-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
