{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iftar Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <header>
        {% include 'main/nav.html' %}
    </header>

    {% include 'main/message.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-top mt-auto">
        {% include 'main/footer.html' %}
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
    (function(){
        // Keep flash overlay fixed at top of viewport. If the navbar is fixed (e.g. has
        // position: fixed or class 'fixed-top'), offset the overlay by navbar height.
        function positionFlash() {
            const overlay = document.querySelector('.flash-overlay');
            if(!overlay) return;
            const nav = document.querySelector('header');
            let top = 8; // default small gap from viewport top
            if (nav) {
                // Use the header's layout height so the overlay appears immediately under the nav
                top = nav.offsetHeight + 8;
            }
            overlay.style.top = top + 'px';
        }

        document.addEventListener('DOMContentLoaded', function(){
            positionFlash();
            window.addEventListener('resize', positionFlash);

            const alerts = document.querySelectorAll('.flash-overlay .alert');
            if(!alerts.length) return;
            setTimeout(() => {
                alerts.forEach(el => {
                    try {
                        const bsAlert = bootstrap.Alert.getOrCreateInstance(el);
                        bsAlert.close();
                    } catch (e) {
                        el.classList.remove('show');
                        setTimeout(()=> el.remove(), 350);
                    }
                });
            }, 4500);
        });
    })();
    </script>
</body>
</html>
